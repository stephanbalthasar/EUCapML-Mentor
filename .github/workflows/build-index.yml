name: Build booklet index (from private DOCX)

on:
  # Manual run
  workflow_dispatch: {}
  # Optional: re-run when you change the workflow or the Python script in this repo
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/build-booklet-index.yml"
      - "mentor/booklet/build_booklet_index.py"

# Permissions block affects only GITHUB_TOKEN; we push with your PAT secret.
permissions:
  contents: read

jobs:
  build-index:
    name: Parse DOCX and update JSON in private repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo (this repo)
        uses: actions/checkout@v4

      - name: Checkout private content repo
        uses: actions/checkout@v4
        with:
          repository: stephanbalthasar/EUCapML-Mentor-Content
          token: ${{ secrets.REPO_XPAT }}      # <-- uses your provided secret name
          path: private-content

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      - name: Generate index JSON from DOCX
        shell: bash
        run: |
          set -euo pipefail
          python mentor/booklet/build_booklet_index.py \
            --input private-content/assets/booklet.docx \
            --output private-content/artifacts/booklet_index.json

      - name: Commit and push JSON to private repo (only if changed)
        working-directory: private-content
        shell: bash
        run: |
          set -euo pipefail

          # Configure author
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the JSON and commit only if there are changes
          git add artifacts/booklet_index.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update artifacts/booklet_index.json [skip ci]"
            # Adjust branch if your private repo uses a different default branch
            git push origin HEAD:main
          fi

      # Optional: attach the JSON to the workflow run for quick inspection
      - name: Upload workflow artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: booklet_index.json
          path: private-content/artifacts/booklet_index.json
          if-no-files-found: warn
